<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vedansh's Interactive Portfolio</title>
  <style>
    :root {
      --bg: #f0f0f0;
      --text: #222;
      --card: #fff;
    }
    body.dark {
      --bg: #121212;
      --text: #eee;
      --card: #1e1e1e;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    header {
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2.5em;
      margin: 0;
    }
    .tagline {
      font-size: 1.2em;
      color: #888;
      height: 30px;
    }
    #toggleMode {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 12px;
      cursor: pointer;
    }
    section {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <button id="toggleMode">Toggle Dark Mode</button>

  <header>
    <h1>Vedansh</h1>
    <div class="tagline" id="tagline"></div>
  </header>

  <section>
    <h2>Projects</h2>
    <div class="projects">
      <div class="card">
        <h3>Jumping Ball Animation</h3>
        <p>CSS + JS powered animation with bounce physics.</p>
      </div>
      <div class="card">
        <h3>Scheduling Algorithm</h3>
        <p>Java/Python implementation with visual timeline.</p>
      </div>
      <div class="card">
        <h3>Interactive Quiz</h3>
        <p>JavaScript quiz with score tracking and feedback.</p>
      </div>
    </div>
  </section>

  <footer>
    &copy; 2025 Vedansh. Built with 💻 and imagination.
  </footer>

  <script>
    // Dark mode toggle
    document.getElementById('toggleMode').onclick = () => {
      document.body.classList.toggle('dark');
    };

    // Typing animation
    const tagline = document.getElementById('tagline');
    const phrases = [
      "Creative Developer",
      "Game Builder",
      "CSS Animator",
      "Code Explorer"
    ];
    let i = 0, j = 0, current = '', isDeleting = false;

    function type() {
      if (i < phrases.length) {
        if (!isDeleting && j <= phrases[i].length) {
          current = phrases[i].substring(0, j++);
        } else if (isDeleting && j >= 0) {
          current = phrases[i].substring(0, j--);
        }

        tagline.textContent = current;

        if (!isDeleting && j === phrases[i].length) {
          isDeleting = true;
          setTimeout(type, 1000);
        } else if (isDeleting && j === 0) {
          isDeleting = false;
          i = (i + 1) % phrases.length;
          setTimeout(type, 500);
        } else {
          setTimeout(type, isDeleting ? 50 : 100);
        }
      }
    }

    type();
  </script>

</body>
</html>
